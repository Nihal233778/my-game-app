   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Mini App</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="423127"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .container { padding: 20px; }
        .btn {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            padding: 12px 20px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mini App Active</h1>
        <p>Ads are loading in the background...</p>
        <button class="btn" onclick="handleClick()">Click for Reward</button>
    </div>

    <script>
        // 3. Initialize Telegram Environment
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Opens the app to full height

        function handleClick() {
            // Haptic feedback for user feel
            tg.HapticFeedback.impactOccurred('medium');
            
            // OnClickA scripts usually trigger on user interaction.
            // Clicking this button should trigger the ad popup/interstitial.
            console.log("Button clicked, ad should trigger if available.");
        }
    </script>
</body>
</html>
