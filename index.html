<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</head>
<body>
    <h1 id="status">Checking SDK...</h1>
    <button id="playBtn" style="display:none; padding: 20px;">Play Ad</button>

    <script>
        const statusH = document.getElementById('status');
        const btn = document.getElementById('playBtn');

        // Wait for Telegram
        window.Telegram.WebApp.ready();

        // 1. Check if the function exists
        if (typeof window.initCdTma === 'function') {
            window.initCdTma({ id: '423127' })
                .then(show => {
                    window.show = show;
                    statusH.innerText = "✅ SDK Ready";
                    btn.style.display = "block";
                })
                .catch(err => {
                    statusH.innerText = "❌ Init Failed: " + err;
                });
        } else {
            statusH.innerText = "❌ SDK Script not loading";
        }

        btn.onclick = () => {
            window.show?.().then(() => {
                alert("Ad Finished!");
            }).catch(e => {
                alert("Ad Error: " + e);
            });
        };
    </script>
</body>
</html>
