  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TMA Ad Manager</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: rgba(0,0,0,0.05);
            padding: 20px;
            border-radius: 15px;
            width: 80%;
            max-width: 300px;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #4CAF50;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        #ad-btn {
            background-color: var(--btn);
            color: var(--btn-text);
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #ad-btn:active { transform: scale(0.98); }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--hint);
        }
    </style>
</head>
<body>

    <div class="card">
        <div><span class="status-dot"></span> App Live</div>
        <h2>Earn Points</h2>
        <p>Click below to watch an ad and support the app!</p>
        
        <button id="ad-btn">🚀 SHOW AD</button>
        
        <div class="footer">Powered by OnClickA</div>
    </div>

    <script async src="https://js.onclckmn.com/static/onclicka.js" data-admpid="423127"></script>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const adButton = document.getElementById('ad-btn');

        // Function to handle the ad logic
        adButton.onclick = function() {
            // 1. Give haptic feedback (vibration)
            tg.HapticFeedback.impactOccurred('medium');

            // 2. Log for debugging
            console.log("Ad request triggered");

            /* IMPORTANT: 
               If your OnClickA script is set to 'Interstitial' or 'Popunder', 
               it will automatically attempt to open when this button is clicked.
            */

            // 3. Fallback Mechanism
            // If the script fails randomly, we tell the user what to do
            tg.showConfirm("Loading ad... If it doesn't appear, would you like to refresh?", (confirmed) => {
                if(confirmed) {
                    location.reload(); // Re-initializes the ad script
                }
            });
        };

        // Customizing the Telegram Main Button as an alternative
        tg.MainButton.setText("CHECK BALANCE").show();
        tg.MainButton.onClick(() => {
            tg.showAlert("Your current balance is 100 points!");
        });
    </script>
</body>
</html>
